name: Update GitHub metrics

on:
  schedule:
    # Daily at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-metrics
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate metrics SVG
        if: ${{ secrets.METRICS_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: juanpiRiv
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: UTC
          output_action: none
          filename: github-metrics.svg

      - name: METRICS_TOKEN not configured
        if: ${{ secrets.METRICS_TOKEN == '' }}
        run: echo "METRICS_TOKEN is missing. Skipping metrics generation."

      - name: Detect metrics changes
        if: ${{ secrets.METRICS_TOKEN != '' }}
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- github-metrics.svg)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: ${{ secrets.METRICS_TOKEN != '' && steps.changes.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg
          git commit -m "chore(profile): update github metrics"
          git push
