name: Update GitHub metrics

on:
  schedule:
    # Daily at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-metrics
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    env:
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate metrics SVG
        if: ${{ env.METRICS_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: juanpiRiv
          template: classic
          base: header, activity, metadata
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_colors: "0:22d3ee, 1:38bdf8, 2:67e8f9, 3:0d9488, 4:14b8a6, 5:2dd4bf"
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: UTC
          config_padding: 6%, 13%
          output_action: none
          filename: github-metrics.svg

      - name: Apply hacker theme
        if: ${{ env.METRICS_TOKEN != '' }}
        run: python scripts/theme_metrics.py

      - name: METRICS_TOKEN not configured
        if: ${{ env.METRICS_TOKEN == '' }}
        run: echo "METRICS_TOKEN is missing. Skipping metrics generation."

      - name: Detect metrics changes
        if: ${{ env.METRICS_TOKEN != '' }}
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- github-metrics.svg)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: ${{ env.METRICS_TOKEN != '' && steps.changes.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg
          git commit -m "chore(profile): update themed github metrics"
          git push
